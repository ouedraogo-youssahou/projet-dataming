# ============================================
# Smart eCommerce Intelligence - Docker Compose
# ============================================

services:
  # ============================================
  # Dashboard Streamlit
  # ============================================
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      target: dashboard
    container_name: ecommerce-dashboard
    env_file:
      - .env
    ports:
      - "8501:8501"
    volumes:
      - ./src/dashboard:/app/src/dashboard
      - ./src/data_analysis:/app/src/data_analysis
      - ./config:/app/config
      - ./data:/app/data
    environment:
      - PYTHON_ENV=development
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-sk-73e4d05b6a5848afa79614910d604f4f}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mcp-server:
        condition: service_started
    networks:
      - ecommerce-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501')", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ============================================
  # Scraping Service (direct scraping)
  # ============================================
  scraper:
    build:
      context: .
      dockerfile: Dockerfile
      target: scraper
    container_name: ecommerce-scraper
    env_file:
       - .env
    volumes:
      - ./src/scraping:/app/src/scraping
      - ./config:/app/config
      - ./data/raw:/app/data/raw
    environment:
      - SHOPIFY_ACCESS_TOKEN=${SHOPIFY_ACCESS_TOKEN}
      - WOOCOMMERCE_CONSUMER_KEY=${WOOCOMMERCE_CONSUMER_KEY}
      - WOOCOMMERCE_CONSUMER_SECRET=${WOOCOMMERCE_CONSUMER_SECRET}
      - WOOCOMMERCE_STORE_URL=${WOOCOMMERCE_STORE_URL}
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ecommerce-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ============================================
  # ML Training Service
  # ============================================
  ml-training:
    build:
      context: .
      dockerfile: Dockerfile
      target: ml-training
    container_name: ecommerce-ml-training
    volumes:
      - ./src/data_analysis:/app/src/data_analysis
      - ./config:/app/config
      - ./data:/app/data
    environment:
      - PYTHON_ENV=development
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_HOST=redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecommerce-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -h postgres", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ============================================
  # MCP Server
  # ============================================
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
      target: mcp-server
    container_name: ecommerce-mcp-server
    ports:
      - "8000:8000"
    volumes:
      - ./src/mcp:/app/src/mcp
      - ./src/llm:/app/src/llm
      - ./src/scraping:/app/src/scraping
      - ./config:/app/config
    environment:
      - MCP_API_KEY=${MCP_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_HOST=redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecommerce-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: ecommerce-postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=ecommerce_db
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    networks:
      - ecommerce-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Redis Cache
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: ecommerce-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    networks:
      - ecommerce-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Jupyter Notebook
  # ============================================
  jupyter:
    build:
      context: .
      dockerfile: Dockerfile
      target: jupyter
    container_name: ecommerce-jupyter
    ports:
      - "8888:8888"
    volumes:
      - ./src:/app/src
      - ./config:/app/config
      - ./data:/app/data
    environment:
      - JUPYTER_TOKEN=${JUPYTER_TOKEN}
      - PYTHON_ENV=development
    networks:
      - ecommerce-network
    restart: unless-stopped
    profiles:
      - dev
    command: ["jupyter", "lab", "--ip=0.0.0.0", "--port=8888", "--no-browser", "--allow-root", "--NotebookApp.token=${JUPYTER_TOKEN:-dev_token_123}"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8888/api/status')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ============================================
  # pgAdmin (PostgreSQL Management)
  # ============================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ecommerce-pgadmin
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD}
    networks:
      - ecommerce-network
    restart: unless-stopped
    profiles:
      - dev
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/misc/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================
  # A2A Agent Cluster (Production Mode)
  # ============================================
  agent-cluster:
    build:
      context: .
      dockerfile: Dockerfile
      target: agent-orchestrator
    container_name: ecommerce-agent-cluster
    volumes:
      - ./src:/app/src
      - ./config:/app/config
      - ./data/raw:/app/data/raw
    environment:
      - PYTHON_ENV=production
      - SHOPIFY_ACCESS_TOKEN=${SHOPIFY_ACCESS_TOKEN}
      - WOOCOMMERCE_CONSUMER_KEY=${WOOCOMMERCE_CONSUMER_KEY}
      - WOOCOMMERCE_CONSUMER_SECRET=${WOOCOMMERCE_CONSUMER_SECRET}
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - USE_REDIS=true
      - AGENT_HEARTBEAT_INTERVAL=30
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecommerce-network
    restart: unless-stopped
    profiles:
      - production
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================
  # Scheduler Service
  # ============================================
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: kfp-components
    container_name: ecommerce-scheduler
    volumes:
      - ./src:/app/src
      - ./config:/app/config
    environment:
      - PYTHON_ENV=production
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - SCRAPING_SCHEDULE=0 3 * * *      # Daily at 3 AM
      - ML_RETRAIN_SCHEDULE=0 4 * * 0    # Weekly Sunday 4 AM
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecommerce-network
    restart: unless-stopped
    profiles:
      - production
    command: ["python", "-m", "src.scheduler.main"]
    healthcheck:
      test: ["CMD", "python", "-c", "from src.scheduler.main import TaskScheduler; print('OK')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================
  # Prometheus Metrics Exporter
  # ============================================
  metrics-exporter:
    build:
      context: .
      dockerfile: Dockerfile
      target: kfp-components
    container_name: ecommerce-metrics-exporter
    volumes:
      - ./src:/app/src
      - ./config:/app/config
    environment:
      - PYTHON_ENV=production
      - PROMETHEUS_PORT=9090
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
    networks:
      - ecommerce-network
    ports:
      - "9090:9090"
    restart: unless-stopped
    profiles:
      - monitoring
      - production
    command: ["python", "-m", "src.monitoring.prometheus_exporter"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/metrics"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

# ============================================
# Networks
# ============================================
networks:
  ecommerce-network:
    driver: bridge

# ============================================
# Volumes
# ============================================
volumes:
  postgres_data:
  redis_data:
  pgadmin_data:

# ============================================
# Environment Variables Template
# ============================================
# Create a .env file with the following variables:
#
# OPENAI_API_KEY=your_openai_api_key
# ANTHROPIC_API_KEY=your_anthropic_api_key
# SHOPIFY_ACCESS_TOKEN=your_shopify_token
# WOOCOMMERCE_CONSUMER_KEY=your_woo_key
# WOOCOMMERCE_CONSUMER_SECRET=your_woo_secret
# POSTGRES_USER=ecommerce_user
# POSTGRES_PASSWORD=secure_password
# REDIS_PASSWORD=redis_password
# MCP_API_KEY=mcp_api_key
# JUPYTER_TOKEN=jupyter_token
# PGADMIN_EMAIL=admin@example.com
# PGADMIN_PASSWORD=pgadmin_password